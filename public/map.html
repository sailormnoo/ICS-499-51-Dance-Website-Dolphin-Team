<!DOCTYPE html>
<html>
<head>
  <title>Brazil Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    .center-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: 50px;
    }
    body {
      background: linear-gradient(to right, blue, green);
      margin: 0;
      padding: 0;
    }
    .bander {
      color: white;
      font-size: larger;
    }
    /* The container is positioned relative so that pins can be absolutely positioned within it */
    .map-container {
      position: relative;
      display: inline-block;
    }
    .pin {
      position: absolute;
      width: 15px;
      height: 15px;
      background-color: red;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
    }
    .card {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      border: 1px solid #ccc;
      padding: 20px;
      width: 300px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }
    /* CSS rule to restrict dance photo size */
    #danceImage img {
      max-width: 100%;
      max-height: 200px;
      width: auto;
      height: auto;
    }
    /* A simple list style for the clustered dances */
    .dance-list {
      list-style: none;
      padding: 0;
    }
    .dance-list li {
      margin-bottom: 0.5rem;
      cursor: pointer;
      text-decoration: underline;
      color: blue;
    }
  </style>
</head>
<body>
<div class="center-container">
  <div class="bander">
    <h1>Brazil Maps</h1>
    <p>Click a red pin to view the dance(s) from that region:</p>
    <button onclick="location.href='index.html'" type="button">Back</button>
  </div>
  <section class="map-container">
    <img src="assets/images/brazil-map.jpg" alt="brazil-map" width="600" height="600">
    <!-- Clustered dance pin(s) will be injected here dynamically -->
  </section>
  <div id="danceCard" class="card">
    <!-- The pop-up content for one or more dances will be placed here -->
  </div>
</div>

<script>
  // Load approved dances and cluster them by proximity
  function loadMapDances() {
    fetch('../src/api/fetch_map_dances.php')
            .then(response => response.json())
            .then(data => {
              if (data.error) {
                console.error(data.error);
              } else {
                // Cluster dances that are close to each other
                let clusters = [];
                const threshold = 20; // Pixels: adjust as needed for your map and clustering

                data.forEach(dance => {
                  let addedToCluster = false;
                  for (let cluster of clusters) {
                    // Compute distance from the dance's coordinates to cluster center
                    let dx = dance.x - cluster.center.x;
                    let dy = dance.y - cluster.center.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < threshold) {
                      // Add this dance to the cluster and update the cluster center (as an average)
                      cluster.dances.push(dance);
                      let sumX = 0, sumY = 0;
                      cluster.dances.forEach(d => {
                        sumX += d.x;
                        sumY += d.y;
                      });
                      cluster.center.x = sumX / cluster.dances.length;
                      cluster.center.y = sumY / cluster.dances.length;
                      addedToCluster = true;
                      break;
                    }
                  }
                  if (!addedToCluster) {
                    // Create a new cluster
                    clusters.push({
                      center: { x: dance.x, y: dance.y },
                      dances: [dance]
                    });
                  }
                });

                // For each cluster, display a single pin at the cluster's center.
                clusters.forEach(cluster => {
                  let pin = document.createElement('div');
                  pin.className = 'pin';
                  // Position the pin using the computed cluster center
                  pin.style.left = cluster.center.x + 'px';
                  pin.style.top = cluster.center.y + 'px';

                  // Display a count if multiple dances are clustered; otherwise, leave it empty
                  if (cluster.dances.length > 1) {
                    pin.textContent = cluster.dances.length;
                  }

                  // Clicking the pin opens a pop-up showing all dances in that cluster.
                  pin.onclick = function() { openClusterCard(cluster.dances); };
                  document.querySelector('.map-container').appendChild(pin);
                });
              }
            })
            .catch(error => console.error('Error loading dances:', error));
  }

  // Opens a pop-up that displays the list of dance(s) in a cluster.
  function openClusterCard(dances) {
    const card = document.getElementById("danceCard");
    let html = "";

    if (dances.length === 1) {
      // If only one dance, display full details.
      const d = dances[0];
      html += `<h3>${d.dance_name}</h3>`;
      html += `<p>${d.description}</p>`;
      if (d.media_url) {
        html += `<p id="danceImage"><img src="${d.media_url}" alt="${d.alttext}"></p>`;
      }
      html += `<button onclick="goToDancePage(${d.dance_id})">View Dance Page</button>`;
    } else {
      // If multiple dances, list them so the user can select one.
      html += `<h3>${dances.length} Dances in this area</h3>`;
      html += `<ul class="dance-list">`;
      dances.forEach(d => {
        html += `<li onclick="goToDancePage(${d.dance_id})">${d.dance_name}</li>`;
      });
      html += `</ul>`;
    }

    // Add a close button.
    html += `<button onclick="closeDanceCard()">Close</button>`;
    card.innerHTML = html;
    card.style.display = "block";
  }

  // Navigate to the dance detail page for a given dance id.
  function goToDancePage(danceId) {
    if (danceId) {
      window.location.href = 'dancePage.php?danceId=' + danceId;
    }
  }

  // Close the dance pop-up.
  function closeDanceCard() {
    document.getElementById("danceCard").style.display = "none";
  }

  // Load the dances when the document is ready.
  document.addEventListener('DOMContentLoaded', loadMapDances);
</script>
</body>
</html>
