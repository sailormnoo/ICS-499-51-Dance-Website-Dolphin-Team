<!DOCTYPE html>
<html>
<head>
  <title>Brazil Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="css/map.css">
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
</head>
<body>
<div id="toolbar-container"></div>
<div class="center-container">
  <div class="bander">
    <h1>Brazil Maps</h1>
    <p>Click the red pins and find brazil dance from that region:</p>
    <button onclick="location.href='index.html'" type="button">
      back</button>
  </div>
  <section class="map">
    <img src="assets/images/brazil-map.jpg" alt="brazil-map" usemap="#brazil-map" width="600" height="600">
    <map name="brazil-map">
      <div class="pin pin1" onclick="openDanceCard('Region 1', 'Samba')"></div>
      <div class="pin pin2" onclick="openDanceCard('Region 2', 'Forró')"></div>
      <div class="pin pin3" onclick="openDanceCard('Region 3', 'Bossa Nova')"></div>
      <div class="pin pin4" onclick="openDanceCard('Region 4', 'Rio')"></div>
      <div class="pin pin5" onclick="openDanceCard('Region 5', 'Rio')"></div>
    </map>
  </section>
  <div id="danceCard" class="card">
    <h3 id="danceTitle">Dance Title</h3>
    <p id="danceDescription">Description of the dance.</p>
    <p id="danceImage">Image of the dance.</p>
    <button class="close-btn" onclick="closeDanceCard()">Close</button>
  </div>

</div>

<script>
  // Function to display the dance card
  function openDanceCard(region, dance) {
    document.getElementById("danceTitle").textContent = dance + " from " + region;
    document.getElementById("danceDescription").textContent = "Learn about " + dance + ", a traditional dance from " + region + ".";
    document.getElementById("danceCard").style.display = "block";
  }

  // Function to close the display dance card
  function closeDanceCard() {
    document.getElementById("danceCard").style.display = "none";
  }
</script>

<!-- Load Bootstrap bundle first -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

<script>
    /* global bootstrap */
    document.addEventListener("DOMContentLoaded", function() {
        fetch("html/toolbar.php")
            .then(response => response.text())
            .then(data => {
                document.getElementById("toolbar-container").innerHTML = data;
                // Reinitialize dropdowns for dynamically added content
                var dropdownElements = document.querySelectorAll('.dropdown-toggle');
                dropdownElements.forEach(function(dropdownToggleEl) {
                    new bootstrap.Dropdown(dropdownToggleEl);
                });
            });
    });
</script>

</body>
</html>
